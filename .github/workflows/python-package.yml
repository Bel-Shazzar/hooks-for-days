# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: 
          - version: 3.12
            black-version: py312
          - version: 3.13
            black-version: py313
          - version: 3.14
            black-version: py314

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version.version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version.versiob }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip --group dev
    - name: Lint with black
      run: |
        python -m black scripts --required-version 26.3.1 --check -t ${{ matrix.python-version.black-version }}
    - name: Test with unittest
      run: |
        python -m unittest -v
