repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v2.3.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
  - repo: local
    hooks:
      - id: copied_lines_at_file_end
        name: Check for copied lines at the end of files
        entry: scripts/copied_lines_at_file_end.py
